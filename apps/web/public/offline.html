<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PathFinder Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(circle at top, #1e293b 0%, #0f172a 55%, #020617 100%);
        color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(100%, 420px);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.88);
        padding: 32px;
        box-shadow: 0 24px 80px rgba(8, 47, 73, 0.35);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #67e8f9;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.1;
      }

      p {
        margin: 16px 0 0;
        color: #cbd5e1;
        font-size: 15px;
        line-height: 1.7;
      }

      button {
        margin-top: 24px;
        min-height: 44px;
        border: 0;
        border-radius: 999px;
        padding: 0 20px;
        background: #22d3ee;
        color: #082f49;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #67e8f9;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">PathFinder</p>
      <h1>You're offline</h1>
      <p>Check your connection and try again. Once you're back online, tap below.</p>
      <button type="button" onclick="window.location.reload()">Reload</button>
    </main>
  </body>
</html>
